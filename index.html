<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="秘封俱乐部同人阅读室：在夜色、铁路、星图和旧科学的气味里，边听音乐边读专辑附带故事。"
    />
    <title>秘封俱乐部 | 夜行读本</title>
    <link rel="stylesheet" href="./styles.css?v=20260617-orbit-polish-v1" />
  </head>
  <body>
    <canvas id="starfield" aria-hidden="true"></canvas>
    <div class="site-vfx" aria-hidden="true">
      <span class="vfx-ring vfx-ring-a"></span>
      <span class="vfx-ring vfx-ring-b"></span>
      <span class="vfx-rail vfx-rail-a"></span>
      <span class="vfx-rail vfx-rail-b"></span>
      <span class="vfx-scan"></span>
    </div>
    <svg class="icon-sprite" aria-hidden="true" focusable="false">
      <symbol id="icon-github" viewBox="0 0 24 24">
        <path d="M9 19c-4.3 1.4 -4.3 -2.5 -6 -3m12 5v-3.5c0 -1 .1 -1.4 -.5 -2c2.8 -.3 5.5 -1.4 5.5 -6a4.6 4.6 0 0 0 -1.3 -3.2a4.2 4.2 0 0 0 -.1 -3.2s-1.1 -.3 -3.5 1.3a12.3 12.3 0 0 0 -6.2 0c-2.4 -1.6 -3.5 -1.3 -3.5 -1.3a4.2 4.2 0 0 0 -.1 3.2a4.6 4.6 0 0 0 -1.3 3.2c0 4.6 2.7 5.7 5.5 6c-.6 .6 -.6 1.2 -.5 2v3.5" />
      </symbol>
      <symbol id="icon-language" viewBox="0 0 24 24">
        <path d="M9 6.371c0 4.418 -2.239 6.629 -5 6.629" />
        <path d="M4 6.371h7" />
        <path d="M5 9c0 2.144 2.252 3.908 6 4" />
        <path d="M12 20l4 -9l4 9" />
        <path d="M19.1 18h-6.2" />
        <path d="M6.694 3l.793 .582" />
      </symbol>
      <symbol id="icon-list-music" viewBox="0 0 24 24">
        <path d="M4 6h14" />
        <path d="M4 11h10" />
        <path d="M4 16h7" />
        <path d="M18 14v5" />
        <path d="M18 19a2 2 0 1 0 0 -4" />
      </symbol>
      <symbol id="icon-play" viewBox="0 0 24 24">
        <path d="M7 4v16l13 -8z" />
      </symbol>
      <symbol id="icon-pause" viewBox="0 0 24 24">
        <path d="M7 5v14" />
        <path d="M17 5v14" />
      </symbol>
      <symbol id="icon-chevron-left" viewBox="0 0 24 24">
        <path d="M15 6l-6 6l6 6" />
      </symbol>
      <symbol id="icon-chevron-right" viewBox="0 0 24 24">
        <path d="M9 6l6 6l-6 6" />
      </symbol>
      <symbol id="icon-chevron-down" viewBox="0 0 24 24">
        <path d="M6 9l6 6l6 -6" />
      </symbol>
      <symbol id="icon-book" viewBox="0 0 24 24">
        <path d="M19 4v16h-12a2 2 0 0 1 -2 -2v-12a2 2 0 0 1 2 -2h12" />
        <path d="M19 16h-12a2 2 0 0 0 -2 2" />
        <path d="M9 8h6" />
      </symbol>
      <symbol id="icon-turntable" viewBox="0 0 24 24">
        <path d="M4 5h16v14h-16z" />
        <path d="M9.5 12m-3.5 0a3.5 3.5 0 1 0 7 0a3.5 3.5 0 1 0 -7 0" />
        <path d="M9.5 12m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" />
        <path d="M16 9l2 2" />
        <path d="M18 11l-3 3" />
        <path d="M15 14l-2 2" />
      </symbol>
      <symbol id="icon-hifuu" viewBox="0 0 48 48">
        <circle cx="24" cy="24" r="17" />
        <circle cx="24" cy="24" r="4" />
        <path d="M7 24h10" />
        <path d="M31 24h10" />
        <path d="M24 7v10" />
        <path d="M24 31v10" />
        <path d="M12.5 12.5l7 7" />
        <path d="M28.5 28.5l7 7" />
        <path d="M35.5 12.5l-7 7" />
        <path d="M19.5 28.5l-7 7" />
        <path d="M16 24c2.8 -4.5 5.5 -6.8 8 -6.8s5.2 2.3 8 6.8c-2.8 4.5 -5.5 6.8 -8 6.8s-5.2 -2.3 -8 -6.8z" />
      </symbol>
    </svg>

    <header class="site-header">
      <a class="brand" href="#/">
        <span class="brand-mark">
          <svg class="brand-icon" aria-hidden="true"><use href="#icon-hifuu"></use></svg>
        </span>
        <span>
          <strong>秘封俱乐部</strong>
          <small>夜行读本</small>
        </span>
      </a>

      <nav class="top-nav" aria-label="主导航">
        <a
          class="github-button"
          href="https://github.com/cloud-oc/Secret-Sealing-Club"
          target="_blank"
          rel="noreferrer"
          aria-label="GitHub"
          title="GitHub"
        >
          <span class="icon-chip" aria-hidden="true">
            <svg class="ui-icon"><use href="#icon-github"></use></svg>
          </span>
        </a>
        <div class="language-switcher">
          <button
            class="language-trigger"
            id="lang-toggle"
            type="button"
            aria-label="切换语言"
            aria-haspopup="true"
            aria-expanded="false"
            aria-controls="language-menu"
          >
            <span class="icon-chip" aria-hidden="true">
              <svg class="ui-icon"><use href="#icon-language"></use></svg>
            </span>
            <span class="visually-hidden" id="language-current">中文</span>
            <span class="language-caret" aria-hidden="true">
              <svg class="ui-icon"><use href="#icon-chevron-down"></use></svg>
            </span>
          </button>
          <div class="language-menu" id="language-menu" role="menu" hidden>
            <button type="button" role="menuitemradio" data-language="zh" aria-checked="true">
              中文
            </button>
            <button type="button" role="menuitemradio" data-language="ja" aria-checked="false">
              日本語
            </button>
          </div>
        </div>
      </nav>
    </header>

    <main id="app" tabindex="-1"></main>

    <div class="player-shell" id="player-shell" aria-label="音乐播放器">
      <div class="player-now">
        <a class="player-art" id="player-art" href="#/" aria-label="打开当前专辑">
          <span></span>
        </a>
        <div class="player-meta">
          <span class="player-index" id="player-index">TRACK 00</span>
          <a class="player-track-link" id="player-title" href="#" target="_blank" rel="noreferrer">
            在书架前停留
          </a>
          <small id="player-album">秘封俱乐部</small>
        </div>
      </div>

      <div class="player-center">
        <div class="player-controls">
          <button class="icon-button" id="prev-track" type="button" aria-label="上一首">
            <svg class="ui-icon" aria-hidden="true"><use href="#icon-chevron-left"></use></svg>
          </button>
          <button class="play-button" id="play-toggle" type="button" aria-label="播放或暂停">
            <svg class="ui-icon" aria-hidden="true"><use href="#icon-play"></use></svg>
          </button>
          <button class="icon-button" id="next-track" type="button" aria-label="下一首">
            <svg class="ui-icon" aria-hidden="true"><use href="#icon-chevron-right"></use></svg>
          </button>
        </div>

        <div class="player-timeline">
          <span id="current-time">0:00</span>
          <input id="seek" type="range" min="0" max="1000" value="0" aria-label="播放进度" />
          <span id="duration">0:00</span>
        </div>
      </div>

      <button
        class="playlist-toggle"
        id="playlist-toggle"
        type="button"
        aria-label="展开曲目列表"
        aria-controls="playlist-panel"
        aria-expanded="false"
        disabled
      >
        <svg class="ui-icon" aria-hidden="true"><use href="#icon-list-music"></use></svg>
      </button>

      <audio id="audio" preload="metadata"></audio>

      <div class="playlist-panel" id="playlist-panel" hidden></div>
    </div>

    <script type="module" src="./src/main.js?v=20260617-orbit-polish-v1"></script>
  </body>
</html>
