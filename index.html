<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="秘封俱乐部同人阅读室：在夜色、铁路、星图和旧科学的气味里，边听音乐边读专辑附带故事。"
    />
    <title>秘封俱乐部 | 夜行读本</title>
    <link rel="stylesheet" href="./styles.css?v=20260616-universe" />
  </head>
  <body>
    <canvas id="starfield" aria-hidden="true"></canvas>

    <header class="site-header">
      <a class="brand" href="#/">
        <span class="brand-mark">秘</span>
        <span>
          <strong>秘封俱乐部</strong>
          <small>夜行读本</small>
        </span>
      </a>

      <nav class="top-nav" aria-label="主导航">
        <a
          class="github-button"
          href="https://github.com/cloud-oc/Secret-Sealing-Club"
          target="_blank"
          rel="noreferrer"
          aria-label="GitHub"
          title="GitHub"
        >
          <span class="github-mark" aria-hidden="true"></span>
          <span>GitHub</span>
        </a>
        <div class="language-switcher">
          <button
            class="language-trigger"
            id="lang-toggle"
            type="button"
            aria-label="切换语言"
            aria-haspopup="true"
            aria-expanded="false"
            aria-controls="language-menu"
          >
            <span class="language-symbol" aria-hidden="true">
              <span>文</span>
              <span>A</span>
            </span>
            <span class="visually-hidden" id="language-current">中文</span>
            <span class="language-caret" aria-hidden="true">⌄</span>
          </button>
          <div class="language-menu" id="language-menu" role="menu" hidden>
            <button type="button" role="menuitemradio" data-language="zh" aria-checked="true">
              中文
            </button>
            <button type="button" role="menuitemradio" data-language="ja" aria-checked="false">
              日本語
            </button>
          </div>
        </div>
      </nav>
    </header>

    <main id="app" tabindex="-1"></main>

    <div class="player-shell" id="player-shell" aria-label="音乐播放器">
      <button
        class="playlist-toggle"
        id="playlist-toggle"
        type="button"
        aria-label="展开曲目列表"
        aria-controls="playlist-panel"
        aria-expanded="false"
        disabled
      >
        ☰
      </button>
      <div class="player-meta">
        <span class="player-index" id="player-index">TRACK 00</span>
        <strong id="player-title">在书架前停留</strong>
        <small id="player-album">秘封俱乐部</small>
      </div>

      <div class="player-controls">
        <button class="icon-button" id="prev-track" type="button" aria-label="上一首">‹</button>
        <button class="play-button" id="play-toggle" type="button" aria-label="播放或暂停">▶</button>
        <button class="icon-button" id="next-track" type="button" aria-label="下一首">›</button>
      </div>

      <div class="player-timeline">
        <span id="current-time">0:00</span>
        <input id="seek" type="range" min="0" max="1000" value="0" aria-label="播放进度" />
        <span id="duration">0:00</span>
      </div>

      <audio id="audio" preload="metadata"></audio>

      <div class="playlist-panel" id="playlist-panel" hidden></div>
    </div>

    <script type="module" src="./src/main.js?v=20260616-universe"></script>
  </body>
</html>
